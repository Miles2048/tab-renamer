<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Renamer Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tab Renamer Pro</h1>
            <p>Personalize your workspace</p>
        </header>
        
        <div class="input-group">
            <div class="label-row">
                <label for="titleInput">New Tab Title</label>
                <button id="settingsBtn" title="Settings" class="icon-btn">⚙️</button>
            </div>
            <div class="input-row" style="position: relative;">
                <div id="emojiBtn" class="emoji-trigger">📁</div>
                <input type="text" id="titleInput" placeholder="Enter new title..." autofocus>
                <button id="aiBtn" class="ai-btn">✨ AI</button>
                
                <div id="emojiPicker" class="emoji-popover hidden">
                    <!-- Emojis will be injected here -->
                </div>
            </div>
        </div>
        </div>

        <div id="settingsPanel" class="hidden">
            <div class="field-group">
                <label for="providerSelect">AI Provider</label>
                <select id="providerSelect">
                    <option value="gemini">Google Gemini</option>
                    <option value="openai">ChatGPT (OpenAI)</option>
                    <option value="claude">Claude (Anthropic)</option>
                    <option value="openrouter">OpenRouter</option>
                </select>
            </div>
            <div class="field-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="Paste your key here...">
            </div>
            <p id="apiHelpText" class="help-text">Get one from <a href="https://aistudio.google.com/app/apikey" target="_blank">AISTUDIO</a></p>
            <div class="field-group" style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
                <button id="resetAllBtn" class="btn-secondary" style="color: var(--danger); border-color: rgba(244, 63, 94, 0.3);">🗑️ Reset All Custom Titles</button>
            </div>
        </div>

        <div id="aiSuggestions" class="hidden">
            <p class="label-sm">AI Suggestions:</p>
            <div id="suggestionsList" class="suggestions-list"></div>
        </div>

        <div class="button-group">
            <button id="applyBtn" class="btn-primary">Apply Rename</button>
            <button id="resetBtn" class="btn-secondary">Reset Original</button>
        </div>

        <footer>
            <span id="status">Ready</span>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
