<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Renamer Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tab Renamer Pro</h1>
            <p>Personalize your workspace</p>
        </header>
        
        <div class="input-group">
            <label for="titleInput">New Tab Title</label>
            <input type="text" id="titleInput" placeholder="Enter new title..." autofocus>
        </div>

        <div class="button-group">
            <button id="applyBtn" class="btn-primary">Apply Rename</button>
            <button id="resetBtn" class="btn-secondary">Reset Original</button>
        </div>

        <footer>
            <span id="status">Ready</span>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
